name: Build Zena-X Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build and upload image
    runs-on: ubuntu-latest

    container:
      image: cachyos/cachyos-v3:latest
      options: --privileged

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          pacman -Syu --noconfirm \
            jq \
            git \
            cpio \
            mkosi \
            paru \
            systemd \
            systemd-ukify \
            erofs-utils \
            btrfs-progs \
            dosfstools \
            mtools \
            squashfs-tools

      - name: Prepare repos for mkosi
        run: |
          pacman-key --init
          pacman-key --recv-key 3056513887B78AEB --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key 3056513887B78AEB

          pacman -U --noconfirm \
            "https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-keyring.pkg.tar.zst" \
            "https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-mirrorlist.pkg.tar.zst"

      - name: Build AUR packages
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

          mkdir -p mkosi.packages

          su - builder -c "
            paru -S --noconfirm --needed --noinstall dms-shell-bin greetd-dms-greeter-git
          "

          cp /home/builder/.cache/paru/clone/*/*.pkg.tar.zst mkosi.packages/ || true
          repo-add mkosi.packages/aur.db.tar.gz mkosi.packages/*.pkg.tar.zst
          echo "=== Packages ==="
          ls mkosi.packages

      - name: Build Zena-X
        run: |
          mkosi --image-version=$(date +%Y.%m.%d) build --output-dir mkosi.output

      - name: List output
        run: ls -lh mkosi.output

      - name: Upload to Gofile
        run: |
          FILE=$(ls -t mkosi.output/Zena-X_*.raw | head -n1)

          curl --fail \
              --retry 5 \
              --retry-delay 5 \
              --retry-all-errors \
              --connect-timeout 30 \
              --max-time 0 \
              -F "file=@$FILE" \
              https://upload.gofile.io/uploadfile \
              -o response.json
          echo "Response:"
          cat response.json

          echo "Download link:"
          jq -r '.data.downloadPage // .data.file.url.full' response.json || true
